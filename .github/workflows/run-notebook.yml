name: Run Notebook
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: mksc
          auto-activate-base: false

      - name: Create required directories
        shell: bash -el {0}
        run: mkdir -p plots model

      - name: Apply econml Python 3.11 patch
        shell: bash -el {0}
        run: |
          UTILS=$(python -c "import econml; import os; print(os.path.join(os.path.dirname(econml.__file__), 'utilities.py'))")
          sed -i 's/from pkg_resources import parse_version/from packaging.version import Version as parse_version/' "$UTILS"

      - name: Lint with ruff
        shell: bash -el {0}
        run: |
          ruff check .
          ruff format --check .

      - name: Run notebook
        shell: bash -el {0}
        run: pytest --nbmake replication.ipynb
