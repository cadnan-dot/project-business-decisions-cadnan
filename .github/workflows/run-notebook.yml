name: Run Notebook
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          generate-run-shell: true

      - name: Create required directories
        shell: micromamba-shell {0}
        run: |
          mkdir -p plots model

      - name: Apply econml Python 3.11 patch
        shell: micromamba-shell {0}
        run: |
          UTILS=$(python -c "import econml; import os; print(os.path.join(os.path.dirname(econml.__file__), 'utilities.py'))")
          sed -i 's/from pkg_resources import parse_version/from packaging.version import Version as parse_version/' "$UTILS"

      - name: Lint with ruff
        shell: micromamba-shell {0}
        run: |
          ruff check .
          ruff format --check .

      - name: Run notebook
        shell: micromamba-shell {0}
        run: |
          pytest --nbmake replication.ipynb
